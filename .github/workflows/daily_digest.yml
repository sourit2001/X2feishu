name: X (Twitter) Unified 2-Hourly Digest

on:
  schedule:
    - cron: '0 */2 * * *'   # Every 2 hours
  workflow_dispatch:        # Allow manual trigger

jobs:
  digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v3
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unified digest
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: python digest.py

      - name: Commit data back to main
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add daily_tweets.json || true
          git commit -m "Update tweet queue and last processed IDs" || true
          git push origin main || echo "No data changes to push"

      - name: Push reports to posts branch
        run: |
          # Store reports temporarily
          mkdir -p ../temp_reports
          cp obsidian_sync/*.md ../temp_reports/ || echo "No reports to copy"
          
          # Switch to posts branch (create if not exists)
          git fetch origin posts:posts || git checkout --orphan posts
          git checkout posts
          
          # Clean existing files and copy new ones
          git rm -rf . || echo "Branch is already empty"
          cp ../temp_reports/*.md . || echo "No new reports found"
          
          # Commit and push to posts branch
          git add .
          git commit -m "Update latest X reports [skip ci]" || echo "No changes to reports"
          git push origin posts
